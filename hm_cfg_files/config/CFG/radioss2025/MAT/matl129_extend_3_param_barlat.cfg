ATTRIBUTES(COMMON)
{
    KEYWORD_STR         = VALUE(STRING, "Solver Keyword");
    LSD_TitleOpt        = VALUE(INT, "Title");
    CommentEnumField    = VALUE(INT, "User Comments");
    Num_Comments        = SIZE("No. of comment lines");
    Comments            = ARRAY[Num_Comments](STRING, "Entity Comments");
    
    Rho                 = VALUE(FLOAT,"Mass density");
    E                   = VALUE(FLOAT,"Young's Modulus");
    Nu                  = VALUE(FLOAT,"Poisson's ratio");
    LSD_LCH00           = VALUE(FUNCT,"Load curve defining uniaxial stress vs uniaxial strain in the given direction 00");
    LSD_LCH45           = VALUE(FUNCT,"Load curve defining uniaxial stress vs uniaxial strain in the given direction 45");
    LSD_LCH90           = VALUE(FUNCT,"Load curve defining uniaxial stress vs uniaxial strain in the given direction 90");
    LSD_LCHBI           = VALUE(FUNCT,"Load curve defining biaxial stress vs biaxial strain");
    LSD_LCHSH           = VALUE(FUNCT,"Load curve defining shear stress vs shear strain");
    LSD_LCR00           = VALUE(FUNCT,"Load curve defining standard R-value vs uniaxial strain in the given direction00");
    LSD_LCR45           = VALUE(FUNCT,"Load curve defining standard R-value vs uniaxial strain in the given direction45");
    LSD_LCR90           = VALUE(FUNCT,"Load curve defining standard R-value vs uniaxial strain in the given direction90");
    LSD_LCRBI           = VALUE(FUNCT,"Load curve defining biaxial R-value vs biaxial strain");
    LSD_LCRSH           = VALUE(FUNCT,"Load curve defining shear R-value vs shear strain");
    LSD_MAT_M           = VALUE(FLOAT,"M, exponent in Barlat's yield surface");

    IO_FLAG             = VALUE(INT,  "io flag");
    LAW_NO              = VALUE(STRING, "");
    Mat_Name_OR_LawNo   = VALUE(INT, "");
    TITLE               = VALUE(STRING,"");

}

SKEYWORDS_IDENTIFIER(COMMON)
{
    KEYWORD_STR         = 9000;
    CommentEnumField    = 3220;
    Num_Comments        = 3101;
    LSD_TitleOpt        = 90;
    Comments            = 3100;

    Rho                 = 118;
    Nu                  = 120;
    E                   = 119;
    
    LSD_LCH00           = 11031;
    LSD_LCH45           = 11032;
    LSD_LCH90           = 11052;
    LSD_LCHBI           = 11040;
    LSD_LCHSH           = 11041;
    
    LSD_LCR00           = 11042;
    LSD_LCR45           = 11043;
    LSD_LCR90           = 11044;
    LSD_LCRBI           = 11034;
    LSD_LCRSH           = 11046;
    LSD_MAT_M           = 314;
            
    IO_FLAG             = -1;                             
}

DRAWABLES(COMMON) {
public:
  MASS_DENSITY  = SCALAR(Rho);
  YOUNG_MODULUS = SCALAR(E);
  POISSON_RATIO = SCALAR(Nu);
  //SOUND_SPEED is speed for ISDO = 0 and 1
  SOUND_SPEED       = EVAL((YOUNG_MODULUS/(MASS_DENSITY*(1-POISSON_RATIO*POISSON_RATIO)))^0.5);
  SOUND_SPEED_ISDO_2      = EVAL((YOUNG_MODULUS/MASS_DENSITY)^0.5);
 private:
  G             = EVAL(YOUNG_MODULUS/(2*(1+POISSON_RATIO)));
  C1            = EVAL(YOUNG_MODULUS/(3*(1-2*POISSON_RATIO)));
 public:
  SOUND_SPEED_SOLID = EVAL(((4*G/3+C1)/MASS_DENSITY)^0.5);
}

GUI(COMMON) 
{
    ASSIGN(KEYWORD_STR,"/MAT/EXTEND_3_PARAM_BARLAT");
    RADIO(CommentEnumField)
    {
        ENUM_VALUE_FLAG=TRUE;
        ADD(1, "Hide in Menu/Export");
        ADD(2, "Show in Menu/Export");
        ADD(3, "Do not export");
    }
    if(CommentEnumField == 2)
    {  
        SIZE(Num_Comments);
        ARRAY(Num_Comments,"")
        {
           SCALAR(Comments);
        }
    }     
    FLAG(LSD_TitleOpt);
    if(LSD_TitleOpt == TRUE)
    {
        ASSIGN(KEYWORD_STR, "_TITLE");
    } 
  mandatory:
    SCALAR(Rho)        {DIMENSION="density";}
  optional:
    SCALAR(E)          {DIMENSION="pressure";}
    SCALAR(Nu)         {DIMENSION="DIMENSIONLESS";}
    DATA(LSD_LCH00);
    DATA(LSD_LCH45);
    DATA(LSD_LCH90);
    DATA(LSD_LCHBI);
    DATA(LSD_LCHSH);
    DATA(LSD_LCR00);
    DATA(LSD_LCR45);
    DATA(LSD_LCR90);
    DATA(LSD_LCRBI);
    DATA(LSD_LCRSH);
    SCALAR(LSD_MAT_M)  {DIMENSION="DIMENSIONLESS";}
}

// File format
FORMAT(radioss2025) 
{
    ASSIGN(IO_FLAG, 0, EXPORT);
    ASSIGN(IO_FLAG, 1, IMPORT);
    if(IO_FLAG == 1)
    {
        HEADER("/MAT/%3s",LAW_NO);
        if(LAW_NO == "LAW" )
        {
            ASSIGN(Mat_Name_OR_LawNo,2);
        }
    }
    else if(IO_FLAG == 0 && Mat_Name_OR_LawNo == 2)
    {
        HEADER("/MAT/LAW129/%d",_ID_);
        CARD("%-100s", TITLE);
    }
    else
    {
        HEADER("/MAT/EXTEND_3_PARAM_BARLAT/%d",_ID_);
        CARD("%-100s", TITLE);
    }    
    COMMENT("#                RHO");
    CARD("%20lg",Rho);
    COMMENT("#                  E                  PR                HOSF                   M");
    CARD("%20lg%20lg%20lg%20lg",E,Nu,LSD_LCHSH,LSD_MAT_M);
    COMMENT("#              LCH00               LCH45               LCH90               LCHBI               LCHSH");
    CARD("%10s%10d%10s%10d%10s%10d%10s%10d%10s%10d",_BLANK_,LSD_LCH00,_BLANK_,LSD_LCH45,_BLANK_,LSD_LCH90,_BLANK_,LSD_LCHBI,_BLANK_,LSD_LCHSH);
    COMMENT("#              LCR00               LCR45               LCR90               LCRBI               LCRSH");
    CARD("%10s%10d%10s%10d%10s%10d%10s%10d%10s%10d",_BLANK_,LSD_LCR00,_BLANK_,LSD_LCR45,_BLANK_,LSD_LCR90,_BLANK_,LSD_LCRBI,_BLANK_,LSD_LCRSH);
}